# ============================================================
# Perfil PRODUCCION - Syntia MVP
# ============================================================
# Activar con: --spring.profiles.active=prod
# O variable de entorno: SPRING_PROFILES_ACTIVE=prod
#
# IMPORTANTE: Este archivo NO debe contener valores reales.
# Todos los secretos se inyectan via variables de entorno.
# ============================================================

# ========================
# Base de datos
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ========================
# JPA / Hibernate
# ========================
# validate: no modifica el schema, solo lo verifica al arrancar
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ========================
# Thymeleaf
# ========================
spring.thymeleaf.cache=true

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================
# OpenAI
# ========================
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1}

# ========================
# Servidor
# ========================
# PORT es la variable estandar en Railway, Render, Heroku
server.port=${PORT:8080}

# ========================
# Logging
# ========================
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.com.syntia.mvp=INFO

