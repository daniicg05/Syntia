spring.application.name=SyntiaMVP

# ========================
# Servidor
# ========================
server.port=8080

# ========================
# Base de datos PostgreSQL
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/syntia_db
spring.datasource.username=syntia
spring.datasource.password=syntia
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Thymeleaf
# ========================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ========================
# JWT
# ========================
jwt.secret=S3cr3tK3yP4r4Synti4Mv9Pl4t4f0rm4D3R3c0m3nd4c10n3sJWT2026
jwt.expiration=86400000

# ========================
# Logging
# ========================
logging.level.org.springframework.security=DEBUG
logging.level.com.syntia.mvp=DEBUG

# ========================
# API - Configuracion general
# ========================
# Los valores de datasource, jwt.secret y jwt.expiration
# pueden sobreescribirse con variables de entorno en produccion:
#   SPRING_DATASOURCE_URL
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
#   JWT_SECRET
#   JWT_EXPIRATION

# ========================
# OpenAI - Motor de matching
# ========================
# Configura tu clave de API de OpenAI para activar el motor semantico.
# Si esta vacia, el sistema usa automaticamente el motor rule-based (fallback).
# Variable de entorno en produccion: OPENAI_API_KEY
openai.api-key=${OPENAI_API_KEY:}
# Modelo recomendado: gpt-4o-mini (rapido y economico) o gpt-4o (mayor precision)
openai.model=gpt-4o-mini
openai.max-tokens=400
openai.temperature=0.3

# ========================
# BDNS - Importacion de convocatorias
# ========================
# true  = usa datos de ejemplo (para desarrollo sin conexion a BDNS)
# false = llama a la API publica real de BDNS
bdns.mock=true
openai.model=gpt-4o-mini
# Tokens maximos por respuesta (la respuesta es JSON corto, 400 es suficiente)
openai.max-tokens=400
# Temperatura: 0.0 = determinista, 1.0 = creativo. 0.3 es optimo para clasificacion.
openai.temperature=0.3

