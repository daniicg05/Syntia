spring.application.name=SyntiaMVP

# ========================
# Servidor
# ========================
server.port=8080

# ========================
# Base de datos PostgreSQL
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/syntia_db
spring.datasource.username=syntia
spring.datasource.password=syntia
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Thymeleaf
# ========================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ========================
# JWT
# ========================
jwt.secret=S3cr3tK3yP4r4Synti4Mv9Pl4t4f0rm4D3R3c0m3nd4c10n3sJWT2026
jwt.expiration=86400000

# ========================
# Logging
# ========================
logging.level.org.springframework.security=DEBUG
logging.level.com.syntia.mvp=DEBUG

# ========================
# API - Configuracion general
# ========================
# Los valores de datasource, jwt.secret y jwt.expiration
# pueden sobreescribirse con variables de entorno en produccion:
#   SPRING_DATASOURCE_URL
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
#   JWT_SECRET
#   JWT_EXPIRATION

