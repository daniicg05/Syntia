<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error 500 - Error del Servidor</title>
    <link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="container text-center" style="max-width:560px;">
    <div class="card shadow-sm border-0 p-5">
        <div class="fs-1 mb-3">⚠️</div>
        <h1 class="h3 mb-2">Error 500 - Algo salió mal</h1>
        <p class="text-muted mb-4" th:text="${error}">Ha ocurrido un error inesperado.</p>
        <a th:href="@{/}" class="btn btn-primary">Volver al inicio</a>
    </div>
</div>
</body>
</html>
