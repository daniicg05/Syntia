<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntia – Crear cuenta</title>
    <link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
    <style>
        body { background: linear-gradient(135deg, #0d6efd11 0%, #f8f9fa 100%); }
        .brand-logo { font-size: 2rem; font-weight: 800; color: #0d6efd; letter-spacing: -1px; }
        .brand-tagline { font-size: 0.8rem; color: #6c757d; letter-spacing: 0.5px; }
        .card { border: none; border-radius: 1rem; }
        .btn-primary { border-radius: 0.5rem; padding: 0.6rem 1.2rem; font-weight: 600; }
        .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.2rem rgba(13,110,253,.15); }
        .req-item { font-size: 0.78rem; color: #6c757d; }
    </style>
</head>
<body class="min-vh-100 d-flex flex-column">

<div class="container d-flex justify-content-center align-items-center flex-grow-1 py-5">
    <div class="card shadow-lg p-4 p-md-5" style="width: 100%; max-width: 460px;">

        <!-- Logo -->
        <div class="text-center mb-4">
            <div class="brand-logo">Syntia</div>
            <div class="brand-tagline text-uppercase">Encuentra las subvenciones de tu proyecto</div>
        </div>

        <h5 class="fw-semibold mb-3">Crear tu cuenta</h5>

        <form th:action="@{/registro}" th:object="${registroDTO}" method="post" novalidate id="formRegistro">

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold small">Email</label>
                <input type="email" id="email" th:field="*{email}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                       placeholder="tu@email.com" autocomplete="email">
                <div class="invalid-feedback" th:errors="*{email}"></div>
                <span id="jsErrorEmail" class="text-danger small"></span>
                <div class="text-danger small mt-1" th:if="${errorEmail}" th:text="${errorEmail}"></div>
            </div>

            <!-- Contraseña -->
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold small">Contraseña</label>
                <input type="password" id="password" th:field="*{password}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                       placeholder="Mínimo 4 caracteres" autocomplete="new-password">
                <div class="invalid-feedback" th:errors="*{password}"></div>
                <span id="jsErrorPassword" class="text-danger small"></span>
            </div>

            <!-- Confirmar contraseña -->
            <div class="mb-4">
                <label for="confirmarPassword" class="form-label fw-semibold small">Confirmar contraseña</label>
                <input type="password" id="confirmarPassword" th:field="*{confirmarPassword}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('confirmarPassword')} ? 'is-invalid'"
                       placeholder="Repite la contraseña" autocomplete="new-password">
                <div class="invalid-feedback" th:errors="*{confirmarPassword}"></div>
                <span id="jsErrorConfirmar" class="text-danger small"></span>
                <div class="text-danger small mt-1" th:if="${errorPassword}" th:text="${errorPassword}"></div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Crear cuenta →</button>
            </div>
        </form>

        <!-- Aviso legal -->
        <p class="text-center text-muted req-item mt-3 mb-0">
            Al registrarte aceptas que las recomendaciones son orientativas.
            <a th:href="@{/aviso-legal}" class="text-muted">Aviso legal</a>
        </p>

        <hr class="my-4">
        <p class="text-center text-muted small mb-0">
            ¿Ya tienes cuenta? <a th:href="@{/login}" class="fw-semibold">Inicia sesión</a>
        </p>
    </div>
</div>

<footer class="text-center py-3">
    <span class="text-muted small">
        &copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> Syntia ·
        <a th:href="@{/aviso-legal}" class="text-muted">Aviso legal</a>
    </span>
</footer>

<script th:src="@{/bootsprap/bootstrap.bundle.min.js}"></script>
<script th:src="@{/javascript/registro.js}"></script>
</body>
</html>
