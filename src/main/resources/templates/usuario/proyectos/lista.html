<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntia – Mis Proyectos</title>
    <link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar-usuario :: navbar-usuario}"></nav>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-0">Mis Proyectos</h2>
            <p class="text-muted small mb-0">Gestiona los proyectos sobre los que quieres buscar subvenciones.</p>
        </div>
        <a th:href="@{/usuario/proyectos/nuevo}" class="btn btn-primary">
            + Nuevo proyecto
        </a>
    </div>

    <!-- Mensaje de éxito -->
    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Sin proyectos -->
    <div th:if="${#lists.isEmpty(proyectos)}" class="card shadow-sm">
        <div class="card-body text-center py-5">
            <p class="text-muted mb-3">Aún no tienes proyectos creados.</p>
            <a th:href="@{/usuario/proyectos/nuevo}" class="btn btn-primary">
                Crear mi primer proyecto
            </a>
        </div>
    </div>

    <!-- Lista de proyectos -->
    <div class="row g-3" th:if="${!#lists.isEmpty(proyectos)}">
        <div class="col-md-6 col-lg-4" th:each="proyecto : ${proyectos}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${proyecto.nombre}">Nombre del proyecto</h5>
                    <div class="mb-2">
                        <span class="badge bg-secondary" th:if="${proyecto.sector}" th:text="${proyecto.sector}"></span>
                        <span class="badge bg-info text-dark ms-1" th:if="${proyecto.ubicacion}" th:text="${proyecto.ubicacion}"></span>
                    </div>
                    <p class="card-text text-muted small"
                       th:text="${#strings.abbreviate(proyecto.descripcion ?: 'Sin descripción', 120)}">
                    </p>
                </div>
                <div class="card-footer bg-white border-0 d-flex gap-2">
                    <a th:href="@{/usuario/proyectos/{id}(id=${proyecto.id})}"
                       class="btn btn-outline-primary btn-sm flex-fill">Ver</a>
                    <a th:href="@{/usuario/proyectos/{id}/editar(id=${proyecto.id})}"
                       class="btn btn-outline-secondary btn-sm flex-fill">Editar</a>
                </div>
            </div>
        </div>
    </div>

</div>

<script th:src="@{/bootsprap/bootstrap.bundle.min.js}"></script>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
