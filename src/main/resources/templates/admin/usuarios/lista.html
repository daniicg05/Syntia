<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntia Admin – Usuarios</title>
    <link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar-admin :: navbar-admin}"></nav>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Gestión de Usuarios</h2>
        <span class="text-muted small" th:text="${#lists.size(usuarios)} + ' usuarios registrados'"></span>
    </div>

    <!-- Alertas -->
    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Registrado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${usuarios}">
                            <td class="text-muted small align-middle" th:text="${u.id}"></td>
                            <td class="align-middle">
                                <a th:href="@{/admin/usuarios/{id}(id=${u.id})}"
                                   th:text="${u.email}" class="text-decoration-none fw-semibold"></a>
                            </td>
                            <td class="align-middle">
                                <span class="badge"
                                      th:classappend="${u.rol.name() == 'ADMIN'} ? 'bg-danger' : 'bg-primary'"
                                      th:text="${u.rol}"></span>
                            </td>
                            <td class="align-middle small text-muted"
                                th:text="${u.creadoEn != null} ? ${#temporals.format(u.creadoEn, 'dd/MM/yyyy')} : '—'">
                            </td>
                            <td class="align-middle text-center">
                                <div class="d-flex justify-content-center gap-2 flex-wrap">
                                    <!-- Cambiar rol -->
                                    <form th:action="@{/admin/usuarios/{id}/rol(id=${u.id})}" method="post"
                                          class="d-flex gap-1">
                                        <select name="rol" class="form-select form-select-sm" style="width:110px;">
                                            <option th:each="r : ${roles}"
                                                    th:value="${r}"
                                                    th:text="${r}"
                                                    th:selected="${r == u.rol}">
                                            </option>
                                        </select>
                                        <button type="submit" class="btn btn-outline-secondary btn-sm">
                                            Cambiar
                                        </button>
                                    </form>
                                    <!-- Eliminar -->
                                    <button type="button" class="btn btn-outline-danger btn-sm"
                                            data-bs-toggle="modal"
                                            th:attr="data-bs-target='#modal-' + ${u.id}">
                                        Eliminar
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(usuarios)}">
                            <td colspan="5" class="text-center text-muted py-4">No hay usuarios registrados.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modales de confirmación de eliminación -->
    <div th:each="u : ${usuarios}">
        <div class="modal fade" th:id="'modal-' + ${u.id}" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">¿Eliminar usuario?</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>Vas a eliminar a <strong th:text="${u.email}"></strong>.</p>
                        <p class="text-danger small mb-0">Esta acción no se puede deshacer.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <form th:action="@{/admin/usuarios/{id}/eliminar(id=${u.id})}" method="post">
                            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
