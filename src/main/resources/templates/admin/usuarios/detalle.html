<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Syntia Admin – ' + ${usuarioDetalle.email}">Syntia Admin – Usuario</title>
    <link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">Syntia <span class="badge bg-danger ms-1 small">Admin</span></span>
    <div class="d-flex gap-2">
        <a th:href="@{/admin/usuarios}" class="btn btn-outline-light btn-sm">← Usuarios</a>
        <a th:href="@{/logout}"         class="btn btn-light btn-sm">Cerrar sesión</a>
    </div>
</nav>

<div class="container py-5" style="max-width: 720px;">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Dashboard</a></li>
            <li class="breadcrumb-item"><a th:href="@{/admin/usuarios}">Usuarios</a></li>
            <li class="breadcrumb-item active" th:text="${usuarioDetalle.email}"></li>
        </ol>
    </nav>

    <!-- Datos del usuario -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white fw-semibold">Datos del usuario</div>
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">ID</dt>
                <dd class="col-sm-9" th:text="${usuarioDetalle.id}"></dd>
                <dt class="col-sm-3">Email</dt>
                <dd class="col-sm-9" th:text="${usuarioDetalle.email}"></dd>
                <dt class="col-sm-3">Rol</dt>
                <dd class="col-sm-9">
                    <span class="badge"
                          th:classappend="${usuarioDetalle.rol.name() == 'ADMIN'} ? 'bg-danger' : 'bg-primary'"
                          th:text="${usuarioDetalle.rol}"></span>
                </dd>
                <dt class="col-sm-3">Registrado</dt>
                <dd class="col-sm-9"
                    th:text="${usuarioDetalle.creadoEn != null} ? ${#temporals.format(usuarioDetalle.creadoEn, 'dd/MM/yyyy HH:mm')} : '—'">
                </dd>
            </dl>
        </div>
    </div>

    <!-- Proyectos del usuario -->
    <div class="card shadow-sm">
        <div class="card-header bg-white fw-semibold">
            Proyectos
            <span class="badge bg-secondary ms-2" th:text="${#lists.size(proyectos)}"></span>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(proyectos)}"
                 class="text-center text-muted py-4 small">
                Este usuario no tiene proyectos.
            </div>
            <ul class="list-group list-group-flush" th:if="${!#lists.isEmpty(proyectos)}">
                <li class="list-group-item d-flex justify-content-between align-items-center"
                    th:each="p : ${proyectos}">
                    <div>
                        <span class="fw-semibold" th:text="${p.nombre}"></span>
                        <span class="badge bg-secondary ms-2" th:if="${p.sector}" th:text="${p.sector}"></span>
                        <span class="badge bg-info text-dark ms-1" th:if="${p.ubicacion}" th:text="${p.ubicacion}"></span>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary btn-sm">
            ← Volver a la lista
        </a>
    </div>

</div>

<script th:src="@{/bootsprap/bootstrap.bundle.min.js}"></script>
</body>
</html>
