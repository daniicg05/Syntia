<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntia – Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
    <style>
        body { background: linear-gradient(135deg, #0d6efd11 0%, #f8f9fa 100%); }
        .brand-logo { font-size: 2rem; font-weight: 800; color: #0d6efd; letter-spacing: -1px; }
        .brand-tagline { font-size: 0.8rem; color: #6c757d; letter-spacing: 0.5px; }
        .card { border: none; border-radius: 1rem; }
        .btn-primary { border-radius: 0.5rem; padding: 0.6rem 1.2rem; font-weight: 600; }
        .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.2rem rgba(13,110,253,.15); }
    </style>
</head>
<body class="min-vh-100 d-flex flex-column">

<div class="container d-flex justify-content-center align-items-center flex-grow-1 py-5">
    <div class="card shadow-lg p-4 p-md-5" style="width: 100%; max-width: 440px;">

        <!-- Logo -->
        <div class="text-center mb-4">
            <div class="brand-logo">Syntia</div>
            <div class="brand-tagline text-uppercase">Plataforma de recomendaciones de subvenciones</div>
        </div>

        <!-- Alertas -->
        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
            <span>⚠️</span> <span>Usuario o contraseña incorrectos.</span>
        </div>
        <div th:if="${param.logout}" class="alert alert-info d-flex align-items-center gap-2 py-2" role="alert">
            <span>👋</span> <span>Has cerrado sesión correctamente.</span>
        </div>
        <div th:if="${param.registro}" class="alert alert-success d-flex align-items-center gap-2 py-2" role="alert">
            <span>✅</span> <span>Cuenta creada. Ya puedes iniciar sesión.</span>
        </div>

        <h5 class="fw-semibold mb-3">Accede a tu cuenta</h5>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold small">Email</label>
                <input type="email" id="username" name="username" class="form-control"
                       placeholder="tu@email.com" required autofocus autocomplete="email">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold small">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Tu contraseña" required autocomplete="current-password">
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Entrar →</button>
            </div>
        </form>

        <hr class="my-4">
        <p class="text-center text-muted small mb-0">
            ¿No tienes cuenta? <a th:href="@{/registro}" class="fw-semibold">Regístrate gratis</a>
        </p>
    </div>
</div>

<footer class="text-center py-3">
    <span class="text-muted small">
        &copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> Syntia ·
        <a th:href="@{/aviso-legal}" class="text-muted">Aviso legal</a>
    </span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
