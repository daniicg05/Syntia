<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntia – Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow p-4" style="width: 100%; max-width: 440px;">

        <h2 class="card-title text-center mb-4">Iniciar Sesión</h2>

        <p th:if="${param.error}" class="alert alert-danger">Usuario o contraseña incorrectos.</p>
        <p th:if="${param.logout}" class="alert alert-info">Has cerrado sesión correctamente.</p>
        <p th:if="${param.registro}" class="alert alert-success">Cuenta creada correctamente. Ya puedes iniciar sesión.</p>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Email</label>
                <input type="email" id="username" name="username" class="form-control"
                       placeholder="tu@email.com" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Contraseña" required>
            </div>
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary">Entrar</button>
            </div>
        </form>

        <hr>
        <p class="text-center mb-0">
            ¿No tienes cuenta? <a th:href="@{/registro}">Regístrate</a>
        </p>

    </div>
</div>

<script th:src="@{/bootsprap/bootstrap.bundle.min.js}"></script>
</body>
</html>
