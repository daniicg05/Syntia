<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Fragment: footer
  Uso: <footer th:replace="~{fragments/footer :: footer}"></footer>
-->
<footer th:fragment="footer" class="bg-white border-top mt-5 py-3">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
        <span class="text-muted small">
            &copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span>
            Syntia MVP — Plataforma de recomendaciones de subvenciones
        </span>
        <div class="d-flex gap-3 small">
            <a th:href="@{/aviso-legal}" class="text-muted text-decoration-none">Aviso legal</a>
            <span class="text-muted">v1.7.0</span>
        </div>
    </div>
</footer>

</body>
</html>
